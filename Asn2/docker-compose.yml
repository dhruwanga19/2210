# Deployed on the VPS. The GitHub Actions pipeline SSHes in and runs
# `docker compose pull && docker compose up -d` from the directory containing
# this file (typically ~/asn2 on the host).
#
# Expected host layout:
#   ~/asn2/docker-compose.yml   <- this file
#   ~/asn2/Caddyfile            <- reverse proxy config
#   ~/asn2/.env                 <- IMAGE_TAG=latest, GAME_DOMAIN=game.example.com (see DEPLOY.md)

services:
  game:
    image: ghcr.io/dhruwanga19/asn2-game:${IMAGE_TAG:-latest}
    container_name: asn2-game
    restart: unless-stopped
    expose:
      - "6080"
    # Tweak default args without rebuilding the image:
    # environment:
    #   BOARD_SIZE: "5"
    #   EMPTY_POSITIONS: "3"
    #   DEPTH: "3"

  caddy:
    image: caddy:2-alpine
    container_name: asn2-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      GAME_DOMAIN: ${GAME_DOMAIN:?GAME_DOMAIN must be set in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - game

volumes:
  caddy_data:
  caddy_config:
